name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # deploy whenever main is updated
  workflow_dispatch:  # allow manual trigger from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; a new push cancels any in-progress run
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # No build step needed — the site is pure static HTML.
      # GitHub Pages will serve everything in the repo root as-is.

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artefact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repo root (index.html + data/ + qr.png)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
